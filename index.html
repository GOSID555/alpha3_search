            padding: 20px;

            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 650px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 20px;
        }
        .search-box {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        .search-box:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .results-table {
            width: 100%;
            border-collapse: collapse;
        }
        .results-table th, .results-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }
        .results-table th {
            background-color: #f8f9fa;
            font-weight: 600;
        }
        .results-table tr:hover {
            background-color: #f1f5f9;
        }
        .code-badge {
            background-color: var(--primary-color);
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
        }
        .country-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .flag-img {
            width: 32px;
            border-radius: 3px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);

        .no-results {

    // ฟังก์ชันแสดงผลข้อมูลและรูปธงชาติ
    function displayResults(data) {
        resultsBody.innerHTML = ''; 
        
        if (data.length === 0) {
            resultsBody.innerHTML = '<tr><td colspan="2" class="no-results">ไม่พบข้อมูลประเทศที่ค้นหา</td></tr>';
            return;
        }

        data.forEach(item => {
            const row = document.createElement('tr');
            // ใช้ FlagCDN ในการดึงรูปธงชาติด้วยรหัส 2 ตัวอักษร
            const flagUrl = `https://flagcdn.com/w40/${item.code2}.png`;
            
            row.innerHTML = `
                <td><span class="code-badge">${item.code3}</span></td>
                <td>
                    <div class="country-info">
                        <img src="${flagUrl}" alt="${item.name} flag" class="flag-img" loading="lazy">
                        <span>${item.name}</span>
                    </div>
                </td>
            `;
            resultsBody.appendChild(row);
        });
    }

    // ระบบค้นหา Real-time
    searchInput.addEventListener('input', function(e) {
        const searchTerm = e.target.value.toLowerCase();
        
        const filteredData = countryData.filter(item => {
            return item.code3.toLowerCase().includes(searchTerm) || 
                   item.name.toLowerCase().includes(searchTerm);
        });

        displayResults(filteredData);
    });

    // โหลดครั้งแรกให้แสดงทุกประเทศ
    displayResults(countryData);
